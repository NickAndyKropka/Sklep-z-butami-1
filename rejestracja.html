    <!-- Formularz rejestracji -->
    <div class="formularz">
        <form action="rejestracja.php" method="post">
            <p>Zarejestruj się</p>
            <h3>Podaj imię:</h3> 
            <input type="text" name="imie" required><br>
            <h3>Podaj nazwisko:</h3>
            <input type="text" name="nazwisko" required><br>
            <h3>Podaj numer telefonu:</h3>
            <input type="text" name="numer" required><br>
            <h3>Podaj e-maila:</h3>
            <input type="text" name="mail" required><br>
            <h3>Podaj nazwę użytkownika</h3>
            <input type="text" name="nazwa" required><br>
            <h3>Podaj hasło:</h3>
            <input type="password" name="pass" required><br>
            <h3>Potwierdź hasło:</h3>
            <input type="password" name="potpass" required><br>
            <input class="guzik" type="submit" value="Zarejestruj się">
        </form>
    </div>
